<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      color: #003087;
      margin-bottom: 14px;
      text-align: center;
    }

    label {
      font-size: 12px;
      color: #555;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #003087;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: #003087;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #001f5b;
    }

    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #28a745;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>PayPal Balance</h1>
  <label for="balance">Novo saldo (ex: 1.250,00)</label>
  <input type="text" id="balance" placeholder="0,00">
  <button id="save">Aplicar</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
